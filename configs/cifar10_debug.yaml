seed: 0
log_every: 1
eval_batches: 2
checkpoint_dir: runs/cifar10_debug
checkpoint_every_steps: 10

data:
  name: cifar10
  source: direct
  data_dir: .data/tfds
  raw_data_dir: .data/cifar_raw
  download_timeout_seconds: 120
  hyperval_size: 256
  max_train_size: 512
  max_hyperval_size: 128
  max_test_size: 256
  normalize: true
  mean: [0.4914, 0.4822, 0.4465]
  std: [0.2470, 0.2435, 0.2616]

classifier:
  backbone: resnet18
  num_classes: 10
  width_multiplier: 1
  batch_size: 32
  epochs: 1
  learning_rate: 0.01
  lr_decay_epochs: []
  lr_decay_factor: 0.1
  optimizer: sgd
  momentum: 0.9
  weight_decay: 0.0005
  cutout_size: 16

pretrain:
  batch_size: 32
  steps: 2
  learning_rate: 0.0002
  beta1: 0.5
  beta2: 0.999
  cutout_size: 16
  image_loss_weight: 1.0
  feature_loss_weight: 1.0
  identity_l2_weight: 0.001

augnet:
  batch_size: 32
  steps: 2
  learning_rate: 0.001
  tau_dim: 128
  tau_dropout: 0.5
  damping: 0.01
  cg_iters: 5
  precompute_s_test: true
  s_test_batches: 1
  identity_l2_weight: 0.001

retrain:
  epochs: 1
  learning_rate: 0.01
  lr_decay_epochs: []
  lr_decay_factor: 0.1
  optimizer: sgd
  momentum: 0.9
  weight_decay: 0.0005
  cutout_size: 16
